
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Student Certificate Generator</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Global Styles */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #fdfbfb, #ebedee); /* Same as generate page */
    }

    header {
      background: linear-gradient(90deg, #8E2DE2, #4A00E0);
      color: white;
      padding: 30px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    header h1 {
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      font-size: 36px;
      margin: 0;
    }

    nav a {
      color: white;
      margin: 0 18px;
      text-decoration: none;
      font-weight: bold;
      font-size: 18px;
    }

    nav a:hover {
      text-decoration: underline;
    }

    /* Section and Form */
    section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 75vh;
      padding: 20px;
    }

    h2 {
      color: #4A00E0;
      margin-bottom: 20px;
      font-size: 28px;
    }

    .contact-image {
      width: 200px;
      height: 200px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      margin-bottom: 20px;
    }

    form {
      background: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      width: 350px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    label {
      margin-top: 10px;
      font-weight: bold;
      text-align: left;
    }

    input, textarea {
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      background-color: gold;
      color: black;
      border: none;
      padding: 12px 20px;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      margin-top: 15px;
      font-size: 16px;
      transition: 0.3s;
    }

    button:hover {
      background-color: orange;
    }

    footer {
      background: linear-gradient(90deg, #4A00E0, #8E2DE2);
      color: white;
      padding: 15px 0;
      font-size: 14px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
  </style>
</head>
<body>
  <header>
    <h1>Contact Us</h1><br>
    <nav>
      <a href="index1.html">Home</a>
      <a href="course1.html">Course</a>
      <a href="ce1.html">Generate</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section>
    

    <h2>To Hear From You</h2>

    <form onsubmit="event.preventDefault(); alert('Message Sent!')">
      <label>Your Name:</label>
      <input type="text" placeholder="Enter your name" required>

      <label>Email:</label>
      <input type="email" placeholder="Enter your email" required>

      <label>Message:</label>
      <textarea rows="5" placeholder="Write your message here" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    © 2025 Student Certificate Generator | All Rights Reserved
  </footer>
</body>
</html>
